<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#6366f1">
    <title>Islamic Routine Report</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <!-- jsPDF & AutoTable -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    
    <!-- SheetJS -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            transition: background-color 0.3s ease;
        }

        /* Light Mode */
        .light-mode {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        /* Dark Mode */
        .dark-mode {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }

        /* Glassmorphism Cards */
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            transition: all 0.3s ease;
        }

        .dark-mode .glass-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .glass-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px 0 rgba(31, 38, 135, 0.45);
        }

        /* Progress Bar */
        .progress-bar {
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 999px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #10b981, #34d399);
            transition: width 0.5s ease;
            border-radius: 999px;
        }

        /* Input Styles */
        .glass-input {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            backdrop-filter: blur(10px);
        }

        .glass-input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .dark-mode .glass-input {
            background: rgba(255, 255, 255, 0.08);
        }

        /* Button Styles */
        .glass-button {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .glass-button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.02);
        }

        .glass-button:active {
            transform: scale(0.98);
        }

        /* Bottom Navigation */
        .bottom-nav {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }

        .dark-mode .bottom-nav {
            background: rgba(255, 255, 255, 0.08);
        }

        .nav-item {
            transition: all 0.3s ease;
        }

        .nav-item.active {
            color: #10b981;
        }

        /* Modal */
        .modal-backdrop {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeIn 0.5s ease;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.5);
        }

        /* Hide number input arrows */
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type=number] {
            -moz-appearance: textfield;
        }

        /* Chart Container */
        .chart-container {
            position: relative;
            height: 300px;
        }

        /* Notification Badge */
        .notification-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: #ef4444;
            color: white;
            border-radius: 999px;
            font-size: 10px;
            padding: 2px 6px;
            font-weight: bold;
        }
    </style>
</head>
<body class="light-mode">
    <!-- Main Container -->
    <div id="app" class="min-h-screen pb-20">
        <!-- Header -->
        <header class="glass-card rounded-none p-4 sticky top-0 z-40">
            <div class="max-w-md mx-auto flex justify-between items-center">
                <h1 class="text-2xl font-bold text-white">Islamic Routine</h1>
                <button id="themeToggle" class="glass-button p-2 rounded-full text-white">
                    <svg id="sunIcon" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>
                    </svg>
                    <svg id="moonIcon" class="w-6 h-6 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Content Container -->
        <main class="max-w-md mx-auto p-4" id="contentArea">
            <!-- Pages will be injected here -->
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav fixed bottom-0 left-0 right-0 z-50">
            <div class="max-w-md mx-auto flex justify-around items-center p-3">
                <button class="nav-item active flex flex-col items-center gap-1 text-white" data-page="dashboard">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
                    </svg>
                    <span class="text-xs">Dashboard</span>
                </button>
                <button class="nav-item flex flex-col items-center gap-1 text-white opacity-60" data-page="analytics">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
                    </svg>
                    <span class="text-xs">Analytics</span>
                </button>
                <button class="nav-item flex flex-col items-center gap-1 text-white opacity-60" data-page="manage">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                    </svg>
                    <span class="text-xs">Manage</span>
                </button>
            </div>
        </nav>
    </div>

    <!-- Modal Container -->
    <div id="modalContainer"></div>

    <script>
        // ============================================
        // DATA HANDLER - Storage Logic
        // ============================================
        class DataHandler {
            constructor() {
                this.initializeDefaultData();
            }

            initializeDefaultData() {
                if (!localStorage.getItem('categories')) {
                    const defaultCategories = [
                        { id: 1, name: 'Prayer', goal: 5, unit: 'count', link: '', reminders: [] },
                        { id: 2, name: 'Quran', goal: 10, unit: 'pages', link: 'https://quran.com/', reminders: [] },
                        { id: 3, name: 'Hadith', goal: 1, unit: 'session', link: 'https://ihadis.com/', reminders: [] },
                        { id: 4, name: 'Islamic Books', goal: 10, unit: 'pages', link: '', reminders: [] },
                        { id: 5, name: 'Academic Study', goal: 60, unit: 'mins', link: '', reminders: [] },
                        { id: 6, name: 'Exercise', goal: 30, unit: 'mins', link: '', reminders: [] }
                    ];
                    localStorage.setItem('categories', JSON.stringify(defaultCategories));
                }
            }

            getCategories() {
                return JSON.parse(localStorage.getItem('categories') || '[]');
            }

            saveCategories(categories) {
                localStorage.setItem('categories', JSON.stringify(categories));
            }

            addCategory(category) {
                const categories = this.getCategories();
                const newId = categories.length > 0 ? Math.max(...categories.map(c => c.id)) + 1 : 1;
                category.id = newId;
                categories.push(category);
                this.saveCategories(categories);
                return category;
            }

            updateCategory(categoryId, updates) {
                const categories = this.getCategories();
                const index = categories.findIndex(c => c.id === categoryId);
                if (index !== -1) {
                    categories[index] = { ...categories[index], ...updates };
                    this.saveCategories(categories);
                    return categories[index];
                }
                return null;
            }

            deleteCategory(categoryId) {
                const categories = this.getCategories();
                const filtered = categories.filter(c => c.id !== categoryId);
                this.saveCategories(filtered);
            }

            getProgress(date) {
                const key = `progress_${date}`;
                return JSON.parse(localStorage.getItem(key) || '{}');
            }

            saveProgress(date, categoryId, value) {
                const key = `progress_${date}`;
                const progress = this.getProgress(date);
                progress[categoryId] = value;
                localStorage.setItem(key, JSON.stringify(progress));
            }

            resetCategoryProgress(date, categoryId) {
                const key = `progress_${date}`;
                const progress = this.getProgress(date);
                delete progress[categoryId];
                localStorage.setItem(key, JSON.stringify(progress));
            }

            getDateRange(startDate, endDate) {
                const dates = [];
                let current = new Date(startDate);
                const end = new Date(endDate);
                
                while (current <= end) {
                    dates.push(this.formatDate(current));
                    current.setDate(current.getDate() + 1);
                }
                
                return dates;
            }

            formatDate(date) {
                const d = new Date(date);
                const year = d.getFullYear();
                const month = String(d.getMonth() + 1).padStart(2, '0');
                const day = String(d.getDate()).padStart(2, '0');
                return `${year}-${month}-${day}`;
            }

            getTheme() {
                return localStorage.getItem('theme') || 'light';
            }

            saveTheme(theme) {
                localStorage.setItem('theme', theme);
            }
        }

        // ============================================
        // NOTIFICATION SYSTEM - Alarms & Alerts
        // ============================================
        class NotificationSystem {
            constructor() {
                this.hasCapacitor = typeof window.Capacitor !== 'undefined';
                this.notificationSound = new Audio('data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAoUXrTp66hVFApGn+DyvmwhBTGG0fPTgjMGHm7A7+OZWBYJ');
                this.initializeNotifications();
            }

            async initializeNotifications() {
                if (this.hasCapacitor) {
                    try {
                        const { LocalNotifications } = window.Capacitor.Plugins;
                        await LocalNotifications.requestPermissions();
                    } catch (error) {
                        console.error('Capacitor notification init failed:', error);
                    }
                } else if ('Notification' in window) {
                    await Notification.requestPermission();
                }
            }

            async scheduleReminder(categoryName, time, categoryId) {
                const [hours, minutes] = time.split(':');
                const notificationTime = new Date();
                notificationTime.setHours(parseInt(hours), parseInt(minutes), 0);

                if (this.hasCapacitor) {
                    try {
                        const { LocalNotifications } = window.Capacitor.Plugins;
                        await LocalNotifications.schedule({
                            notifications: [{
                                id: parseInt(`${categoryId}${hours}${minutes}`),
                                title: 'Islamic Routine Reminder',
                                body: `Time for ${categoryName}`,
                                schedule: {
                                    at: notificationTime,
                                    allowWhileIdle: true
                                },
                                sound: 'default',
                                importance: 5,
                                priority: 2
                            }]
                        });
                    } catch (error) {
                        console.error('Capacitor notification schedule failed:', error);
                        this.browserFallback(categoryName);
                    }
                } else {
                    this.browserFallback(categoryName);
                }
            }

            browserFallback(categoryName) {
                if ('Notification' in window && Notification.permission === 'granted') {
                    new Notification('Islamic Routine Reminder', {
                        body: `Time for ${categoryName}`,
                        icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="%2310b981"/></svg>'
                    });
                } else {
                    try {
                        this.notificationSound.play();
                    } catch (e) {
                        console.error('Audio playback failed:', e);
                    }
                    alert(`⏰ Reminder: Time for ${categoryName}`);
                }
            }

            async cancelReminder(categoryId, time) {
                if (this.hasCapacitor) {
                    try {
                        const [hours, minutes] = time.split(':');
                        const { LocalNotifications } = window.Capacitor.Plugins;
                        await LocalNotifications.cancel({
                            notifications: [{ id: parseInt(`${categoryId}${hours}${minutes}`) }]
                        });
                    } catch (error) {
                        console.error('Cancel notification failed:', error);
                    }
                }
            }
        }

        // ============================================
        // UI RENDERER - DOM Manipulation
        // ============================================
        class UIRenderer {
            constructor(dataHandler, notificationSystem) {
                this.dataHandler = dataHandler;
                this.notificationSystem = notificationSystem;
                this.currentDate = this.dataHandler.formatDate(new Date());
                this.currentPage = 'dashboard';
                this.charts = {};
            }

            init() {
                this.setupTheme();
                this.setupEventListeners();
                this.renderPage('dashboard');
            }

            setupTheme() {
                const theme = this.dataHandler.getTheme();
                document.body.className = theme === 'dark' ? 'dark-mode' : 'light-mode';
                this.updateThemeIcon(theme);
            }

            updateThemeIcon(theme) {
                const sunIcon = document.getElementById('sunIcon');
                const moonIcon = document.getElementById('moonIcon');
                
                if (theme === 'dark') {
                    sunIcon.classList.add('hidden');
                    moonIcon.classList.remove('hidden');
                } else {
                    sunIcon.classList.remove('hidden');
                    moonIcon.classList.add('hidden');
                }
            }

            setupEventListeners() {
                // Theme toggle
                document.getElementById('themeToggle').addEventListener('click', () => {
                    const currentTheme = this.dataHandler.getTheme();
                    const newTheme = currentTheme === 'light' ? 'dark' : 'light';
                    this.dataHandler.saveTheme(newTheme);
                    document.body.className = newTheme === 'dark' ? 'dark-mode' : 'light-mode';
                    this.updateThemeIcon(newTheme);
                });

                // Navigation
                document.querySelectorAll('.nav-item').forEach(item => {
                    item.addEventListener('click', (e) => {
                        const page = e.currentTarget.dataset.page;
                        this.navigateTo(page);
                    });
                });
            }

            navigateTo(page) {
                this.currentPage = page;
                
                // Update nav items
                document.querySelectorAll('.nav-item').forEach(item => {
                    if (item.dataset.page === page) {
                        item.classList.add('active');
                        item.classList.remove('opacity-60');
                    } else {
                        item.classList.remove('active');
                        item.classList.add('opacity-60');
                    }
                });

                this.renderPage(page);
            }

            renderPage(page) {
                const contentArea = document.getElementById('contentArea');
                
                switch(page) {
                    case 'dashboard':
                        this.renderDashboard(contentArea);
                        break;
                    case 'analytics':
                        this.renderAnalytics(contentArea);
                        break;
                    case 'manage':
                        this.renderManage(contentArea);
                        break;
                }
            }

            renderDashboard(container) {
                const categories = this.dataHandler.getCategories();
                const progress = this.dataHandler.getProgress(this.currentDate);
                
                container.innerHTML = `
                    <div class="fade-in">
                        <!-- Date Navigation -->
                        <div class="glass-card rounded-2xl p-4 mb-4">
                            <div class="flex items-center justify-between">
                                <button id="prevDate" class="glass-button p-2 rounded-lg text-white">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                                    </svg>
                                </button>
                                <input type="date" id="dateSelector" value="${this.currentDate}" 
                                    class="glass-input rounded-lg px-4 py-2 text-center text-white font-semibold">
                                <button id="nextDate" class="glass-button p-2 rounded-lg text-white">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                                    </svg>
                                </button>
                            </div>
                        </div>

                        <!-- Overall Progress -->
                        <div class="glass-card rounded-2xl p-6 mb-4">
                            <div class="text-center">
                                <h2 class="text-white text-lg font-semibold mb-2">Today's Progress</h2>
                                <div class="text-5xl font-bold text-white mb-2">${this.calculateOverallProgress(categories, progress)}%</div>
                                <div class="progress-bar">
                                    <div class="progress-fill" style="width: ${this.calculateOverallProgress(categories, progress)}%"></div>
                                </div>
                            </div>
                        </div>

                        <!-- Category Cards -->
                        <div id="categoryCards" class="space-y-4">
                            ${categories.length === 0 ? `
                                <div class="glass-card rounded-2xl p-8 text-center">
                                    <svg class="w-16 h-16 mx-auto mb-4 text-white opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"></path>
                                    </svg>
                                    <p class="text-white text-lg mb-2">No Categories Yet</p>
                                    <p class="text-white opacity-75 mb-4">Add your first routine category to get started</p>
                                    <button onclick="uiRenderer.navigateTo('manage')" class="glass-button px-6 py-2 rounded-lg text-white font-semibold">
                                        Go to Manage
                                    </button>
                                </div>
                            ` : categories.map(category => this.renderCategoryCard(category, progress[category.id] || 0)).join('')}
                        </div>
                    </div>
                `;

                this.attachDashboardListeners();
            }

            renderCategoryCard(category, currentProgress) {
                const percentage = Math.min((currentProgress / category.goal) * 100, 100);
                const isComplete = currentProgress >= category.goal;
                
                return `
                    <div class="glass-card rounded-2xl p-5">
                        <div class="flex justify-between items-start mb-3">
                            <div class="flex-1">
                                ${category.link ? 
                                    `<a href="${category.link}" target="_blank" class="text-white font-bold text-lg hover:underline">${category.name}</a>` :
                                    `<h3 class="text-white font-bold text-lg">${category.name}</h3>`
                                }
                                <p class="text-white opacity-75 text-sm">Goal: ${category.goal} ${category.unit}</p>
                            </div>
                            ${isComplete ? `
                                <svg class="w-8 h-8 text-green-400" fill="currentColor" viewBox="0 0 20 20">
                                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path>
                                </svg>
                            ` : ''}
                        </div>

                        <div class="mb-4">
                            <div class="flex justify-between text-white text-sm mb-2">
                                <span>${currentProgress} / ${category.goal} ${category.unit}</span>
                                <span>${percentage.toFixed(0)}%</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${percentage}%"></div>
                            </div>
                        </div>

                        <div class="flex gap-2">
                            <input type="number" 
                                class="glass-input rounded-lg px-3 py-2 flex-1 text-white" 
                                placeholder="Enter ${category.unit}"
                                value="${currentProgress || ''}"
                                data-category-id="${category.id}"
                                id="progress-${category.id}">
                            <button class="glass-button px-4 py-2 rounded-lg text-white font-semibold update-progress" 
                                data-category-id="${category.id}">
                                Update
                            </button>
                            <button class="glass-button px-4 py-2 rounded-lg text-white font-semibold reset-progress" 
                                data-category-id="${category.id}"
                                title="Reset Today">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                                </svg>
                            </button>
                        </div>
                    </div>
                `;
            }

            attachDashboardListeners() {
                // Date navigation
                document.getElementById('prevDate').addEventListener('click', () => {
                    const date = new Date(this.currentDate);
                    date.setDate(date.getDate() - 1);
                    this.currentDate = this.dataHandler.formatDate(date);
                    document.getElementById('dateSelector').value = this.currentDate;
                    this.renderPage('dashboard');
                });

                document.getElementById('nextDate').addEventListener('click', () => {
                    const date = new Date(this.currentDate);
                    date.setDate(date.getDate() + 1);
                    this.currentDate = this.dataHandler.formatDate(date);
                    document.getElementById('dateSelector').value = this.currentDate;
                    this.renderPage('dashboard');
                });

                document.getElementById('dateSelector').addEventListener('change', (e) => {
                    this.currentDate = e.target.value;
                    this.renderPage('dashboard');
                });

                // Progress updates
                document.querySelectorAll('.update-progress').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const categoryId = parseInt(e.target.dataset.categoryId);
                        const input = document.getElementById(`progress-${categoryId}`);
                        const value = parseFloat(input.value) || 0;
                        this.dataHandler.saveProgress(this.currentDate, categoryId, value);
                        this.renderPage('dashboard');
                    });
                });

                // Reset progress
                document.querySelectorAll('.reset-progress').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const categoryId = parseInt(e.target.dataset.categoryId);
                        if (confirm('Reset progress for this category today?')) {
                            this.dataHandler.resetCategoryProgress(this.currentDate, categoryId);
                            this.renderPage('dashboard');
                        }
                    });
                });
            }

            calculateOverallProgress(categories, progress) {
                if (categories.length === 0) return 0;
                
                let totalPercentage = 0;
                categories.forEach(category => {
                    const current = progress[category.id] || 0;
                    const percentage = Math.min((current / category.goal) * 100, 100);
                    totalPercentage += percentage;
                });
                
                return Math.round(totalPercentage / categories.length);
            }

                const isEdit = category !== null;

                    const remindersList = document.getElementById('remindersList');
                    const newReminder = document.createElement('div');
                    newReminder.className = 'flex gap-2';
                    newReminder.innerHTML = `
                        <input type="time" class="glass-input rounded-lg px-4 py-2 flex-1 text-white reminder-time">
                        <button class="glass-button px-3 py-2 rounded-lg text-red-300 remove-reminder-new">

                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                            </svg>
                        </button>
                    `;
                    remindersList.appendChild(newReminder);

                    // Attach listener to new remove button
                    newReminder.querySelector('.remove-reminder-new').addEventListener('click', (e) => {
                        e.target.closest('.flex').remove();
                    });
                });

                // Remove existing reminders
                document.querySelectorAll('.remove-reminder').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.target.closest('.flex').remove();
                    });
                });

                // Save category
                document.getElementById('saveCategoryBtn').addEventListener('click', () => {
                    const name = document.getElementById('categoryName').value.trim();
                    const goal = parseFloat(document.getElementById('categoryGoal').value);
                    const unit = document.getElementById('categoryUnit').value.trim();
                    const link = document.getElementById('categoryLink').value.trim();
                    const reminders = Array.from(document.querySelectorAll('.reminder-time'))
                        .map(input => input.value)
                        .filter(val => val);

                    if (!name || !goal || !unit) {
                        alert('Please fill in all required fields');
                        return;
                    }

                    const categoryData = { name, goal, unit, link, reminders };

                    if (isEdit) {
                        this.dataHandler.updateCategory(category.id, categoryData);
                        // Cancel old reminders and set new ones
                        if (category.reminders) {
                            category.reminders.forEach(time => {
                                this.notificationSystem.cancelReminder(category.id, time);
                            });
                        }
                    } else {
                        const newCategory = this.dataHandler.addCategory(categoryData);
                        categoryData.id = newCategory.id;
                    }

                    // Schedule new reminders
                    reminders.forEach(time => {
                        this.notificationSystem.scheduleReminder(name, time, categoryData.id || category.id);
                    });

                    this.closeModal();
                    this.renderPage('manage');
                });

                // Cancel
                document.getElementById('cancelModalBtn').addEventListener('click', () => {
                    this.closeModal();
                });

                // Close on backdrop click
                document.querySelector('.modal-backdrop').addEventListener('click', (e) => {
                    if (e.target === e.currentTarget) {
                        this.closeModal();
                    }
                });
            }

            closeModal() {
                document.getElementById('modalContainer').innerHTML = '';
            }

        // ============================================
        // EXPORT MANAGER - PDF & Excel Generation
        // ============================================
        class ExportManager {
            constructor(dataHandler) {
                this.dataHandler = dataHandler;
            }

            getMonthData(monthString) {
                // monthString format: "2024-03"
                const [year, month] = monthString.split('-');
                const startDate = new Date(year, month - 1, 1);
                const endDate = new Date(year, month, 0);
                
                const dates = this.dataHandler.getDateRange(startDate, endDate);
                const categories = this.dataHandler.getCategories();
                
                return { dates, categories };
            }

            exportToExcel(monthString) {
                if (!monthString) {
                    alert('Please select a month to export');
                    return;
                }

                const { dates, categories } = this.getMonthData(monthString);
                
                if (categories.length === 0) {
                    alert('No categories to export');
                    return;
                }

                // Create workbook
                const wb = XLSX.utils.book_new();
                
                // Prepare data
                const data = [
                    ['Date', ...categories.map(c => `${c.name} (${c.unit})`), ...categories.map(c => `${c.name} %`)]
                ];

                dates.forEach(date => {
                    const progress = this.dataHandler.getProgress(date);
                    const row = [date];
                    
                    // Add actual values
                    categories.forEach(cat => {
                        const value = progress[cat.id] || 0;
                        row.push(value);
                    });
                    
                    // Add percentages
                    categories.forEach(cat => {
                        const value = progress[cat.id] || 0;
                        const percentage = Math.min((value / cat.goal) * 100, 100).toFixed(1);
                        row.push(`${percentage}%`);
                    });
                    
                    data.push(row);
                });

                // Add summary row
                const summaryRow = ['AVERAGE'];
                categories.forEach(cat => {
                    const total = dates.reduce((sum, date) => {
                        const progress = this.dataHandler.getProgress(date);
                        return sum + (progress[cat.id] || 0);
                    }, 0);
                    const avg = (total / dates.length).toFixed(1);
                    summaryRow.push(avg);
                });
                
                categories.forEach(cat => {
                    const avgPercentage = dates.reduce((sum, date) => {
                        const progress = this.dataHandler.getProgress(date);
                        const value = progress[cat.id] || 0;
                        const percentage = Math.min((value / cat.goal) * 100, 100);
                        return sum + percentage;
                    }, 0) / dates.length;
                    summaryRow.push(`${avgPercentage.toFixed(1)}%`);
                });
                
                data.push(summaryRow);

                // Create worksheet
                const ws = XLSX.utils.aoa_to_sheet(data);
                
                // Add worksheet to workbook
                XLSX.utils.book_append_sheet(wb, ws, 'Monthly Report');
                
                // Generate filename
                const filename = `Islamic_Routine_${monthString}.xlsx`;
                
                // Download
                XLSX.writeFile(wb, filename);
            }

            exportToPDF(monthString) {
                if (!monthString) {
                    alert('Please select a month to export');
                    return;
                }

                const { dates, categories } = this.getMonthData(monthString);
                
                if (categories.length === 0) {
                    alert('No categories to export');
                    return;
                }

                const { jsPDF } = window.jspdf;
                const doc = new jsPDF('l', 'mm', 'a4'); // Landscape orientation

                // Title
                doc.setFontSize(18);
                doc.text('Islamic Routine Report', 14, 15);
                
                doc.setFontSize(12);
                doc.text(`Month: ${monthString}`, 14, 25);

                // Prepare table data
                const headers = [
                    ['Date', ...categories.map(c => `${c.name}\n(${c.unit})`), ...categories.map(c => `${c.name}\n%`)]
                ];

                const body = dates.map(date => {
                    const progress = this.dataHandler.getProgress(date);
                    const row = [date];
                    
                    // Actual values
                    categories.forEach(cat => {
                        row.push((progress[cat.id] || 0).toString());
                    });
                    
                    // Percentages
                    categories.forEach(cat => {
                        const value = progress[cat.id] || 0;
                        const percentage = Math.min((value / cat.goal) * 100, 100).toFixed(1);
                        row.push(`${percentage}%`);
                    });
                    
                    return row;
                });

                // Summary row
                const summaryRow = ['AVG'];
                categories.forEach(cat => {
                    const total = dates.reduce((sum, date) => {
                        const progress = this.dataHandler.getProgress(date);
                        return sum + (progress[cat.id] || 0);
                    }, 0);
                    const avg = (total / dates.length).toFixed(1);
                    summaryRow.push(avg);
                });
                
                categories.forEach(cat => {
                    const avgPercentage = dates.reduce((sum, date) => {
                        const progress = this.dataHandler.getProgress(date);
                        const value = progress[cat.id] || 0;
                        const percentage = Math.min((value / cat.goal) * 100, 100);
                        return sum + percentage;
                    }, 0) / dates.length;
                    summaryRow.push(`${avgPercentage.toFixed(1)}%`);
                });
                
                body.push(summaryRow);

                // Generate table
                doc.autoTable({
                    head: headers,
                    body: body,
                    startY: 30,
                    theme: 'grid',
                    headStyles: {
                        fillColor: [99, 102, 241],
                        fontSize: 8,
                        cellPadding: 2
                    },
                    bodyStyles: {
                        fontSize: 7,
                        cellPadding: 1.5
                    },
                    columnStyles: {
                        0: { cellWidth: 25, fontStyle: 'bold' }
                    },
                    margin: { top: 30, left: 10, right: 10 },
                    tableWidth: 'auto',
                    styles: {
                        overflow: 'linebreak',
                        cellWidth: 'wrap'
                    }
                });

                // Footer
                const pageCount = doc.internal.getNumberOfPages();
                for (let i = 1; i <= pageCount; i++) {
                    doc.setPage(i);
                    doc.setFontSize(8);
                    doc.text(`Page ${i} of ${pageCount}`, doc.internal.pageSize.getWidth() / 2, doc.internal.pageSize.getHeight() - 10, { align: 'center' });
                    doc.text(`Generated on ${new Date().toLocaleDateString()}`, 14, doc.internal.pageSize.getHeight() - 10);
                }

                // Save
                doc.save(`Islamic_Routine_${monthString}.pdf`);
            }
        }

        // ============================================
        // SERVICE WORKER REGISTRATION (PWA)
        // ============================================
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const swCode = `
                    self.addEventListener('install', (e) => {
                        console.log('Service Worker installed');
                        self.skipWaiting();
                    });

                    self.addEventListener('activate', (e) => {
                        console.log('Service Worker activated');
                        return self.clients.claim();
                    });

                    self.addEventListener('fetch', (e) => {
                        e.respondWith(
                            caches.match(e.request).then(response => {
                                return response || fetch(e.request);
                            })
                        );
                    });
                `;

                const blob = new Blob([swCode], { type: 'application/javascript' });
                const swUrl = URL.createObjectURL(blob);

                navigator.serviceWorker.register(swUrl)
                    .then(reg => console.log('Service Worker registered'))
                    .catch(err => console.log('Service Worker registration failed:', err));
            });
        }

        // ============================================
        // APP INITIALIZATION
        // ============================================
        const dataHandler = new DataHandler();
        const notificationSystem = new NotificationSystem();
        const uiRenderer = new UIRenderer(dataHandler, notificationSystem);
        const exportManager = new ExportManager(dataHandler);

        // Initialize app
        document.addEventListener('DOMContentLoaded', () => {
            uiRenderer.init();
        });
    </script>
</body>
</html>
